    psk_key: "123456"                     # Mat khau chung phai giong nhau
  tasks:
    - name: 1. Tao Phase 1 (Cong ao VPN)
      fortinet.fortios.fortios_vpn_ipsec_phase1_interface:
        vdom: "root"
        state: "present"
        vpn_ipsec_phase1_interface:
          name: "{{ vpn_name }}"
