    - name: 4. Firewall Policy (Cho phep 2 chieu)
      fortinet.fortios.fortios_firewall_policy:
        vdom: "root"
        state: "present"
        firewall_policy:
          policyid: 101
          name: "VPN_Traffic_S2_to_S1"
          srcintf: [{"name": "any"}]
          dstintf: [{"name": "{{ vpn_name }}"}]
          srcaddr: [{"name": "all"}]
          dstaddr: [{"name": "all"}]
          action: "accept"
          schedule: "always"
          service: [{"name": "ALL"}]
          nat: "disable"

    - name: 5. Firewall Policy (Cho phep chieu VPN chui ra LAN)
      fortinet.fortios.fortios_firewall_policy:
        vdom: "root"
        state: "present"
        firewall_policy:
          policyid: 102
